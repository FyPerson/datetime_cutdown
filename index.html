<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="倒计时清单 - 帮助您追踪重要日期和事件">
    <title>倒计时清单</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./sakura.css">
    <!-- 只加载需要的图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/solid.min.css">
    <script src="./lunar.js" defer></script>
    <script src="./sakura.js" defer></script>
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <nav class="theme-switch">
            <button id="theme-toggle" aria-label="切换主题">
                <i class="fas fa-sun light-icon" aria-hidden="true"></i>
                <i class="fas fa-moon dark-icon" aria-hidden="true"></i>
                <span class="theme-text">切换主题</span>
            </button>
        </nav>
        <h1><i class="fas fa-hourglass-half" aria-hidden="true"></i> 倒计时清单</h1>
    </header>

    <main>
        <section id="current-time" class="current-time">
            <div id="solar-date" class="solar-date">
                <i class="fas fa-calendar-alt" aria-hidden="true"></i>
                <span id="solar-date-text"></span>
            </div>
            <div id="lunar-date" class="lunar-date">
                <i class="fas fa-moon" aria-hidden="true"></i>
                <span id="lunar-date-text"></span>
            </div>
        </section>

        <section class="precise-countdown-container">
            <span class="countdown-label">
                <i class="fas fa-plane-departure" aria-hidden="true"></i>
                距离1月24日放假还有:
            </span>
            <div id="precise-countdown" class="precise-countdown"></div>
        </section>

        <section id="stats-container"></section>
    </main>
</body>
</html>
